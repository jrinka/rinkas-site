<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interests — rinkas.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.35);
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav ul { list-style: none; display: flex; gap: 2rem; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); }

    .page-header {
      padding: 4rem 2.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 0.75rem;
    }

    .page-header h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-header p {
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 2.5rem 6rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .section h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .item:hover {
      border-color: rgba(124, 106, 247, 0.5);
      transform: translateY(-2px);
    }

    .item-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .item-sub {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .empty {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.875rem;
      font-style: italic;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">rinka<span>s</span>.com</a>
    <ul>
      <li><a href="/interests.html" class="active">Interests</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>Inter<em>ests</em></h1>
    <p>Things I'm into.</p>
  </div>

  <main>

    <div class="section">
      <h2>📚 Books</h2>
      <div class="items">
        <div class="empty">Add your favorites here.</div>
      </div>
    </div>

    <div class="section">
      <h2>🎮 Games</h2>
      <div class="items">
        <div class="empty">Add your favorites here.</div>
      </div>
    </div>

    <div class="section">
      <h2>🎨 Art</h2>
      <div class="items">
        <div class="empty">Add your favorites here.</div>
      </div>
    </div>

    <div class="section">
      <h2>🎬 Film / TV</h2>
      <div class="items">
        <div class="empty">Add your favorites here.</div>
      </div>
    </div>

  </main>

  <footer>© 2026 rinkas.com</footer>

</body>
</html>
