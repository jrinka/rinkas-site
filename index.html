<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rinkas.com</title>
  <style>
    body {
      background: #c0c0c0;
      color: #000;
      font-family: "Times New Roman", Times, serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    h1 {
      font-size: 2.2rem;
      color: #000080;
      margin-bottom: 16px;
    }

    hr {
      border: none;
      border-top: 2px solid #808080;
      border-bottom: 1px solid #fff;
      margin: 16px 0;
    }

    .under-construction {
      background: #ffff00;
      border: 2px solid #000;
      padding: 8px 12px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .uc-icon {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: repeating-linear-gradient(
        45deg,
        #000 0px, #000 4px,
        #ffcc00 4px, #ffcc00 8px
      );
      flex-shrink: 0;
    }

    h2 {
      font-size: 1.2rem;
      color: #800000;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    ul {
      margin: 0 0 12px 20px;
      padding: 0;
    }

    li { margin-bottom: 4px; }

    a { color: #0000ee; }
    a:visited { color: #551a8b; }
    a:hover { color: #ff0000; }

    .counter {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .counter-digits {
      font-family: "Courier New", monospace;
      background: #000;
      color: #00ff41;
      padding: 2px 6px;
      letter-spacing: 0.15em;
      font-size: 0.9rem;
      border: 1px inset #444;
    }

    address {
      font-style: normal;
      font-size: 0.8rem;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <h1>rinkas.com</h1>

  <hr />

  <div class="under-construction">
    <span class="uc-icon"></span>
    under construction as I figure this out
    <span class="uc-icon"></span>
  </div>

  <h2>Interests</h2>
  <ul>
    <li><a href="/interests.html">Interests</a></li>
  </ul>

  <h2>Toys</h2>
  <ul>
    <li><a href="#">Toys</a></li>
  </ul>

  <hr />

  <address>Last updated: April 2026</address>

  <div class="counter">
    <span>&#128100; Visitors:</span>
    <span class="counter-digits">0000247</span>
  </div>

</body>
</html>
