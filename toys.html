<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #c0c0c0;
      font-family: "Times New Roman", Times, serif;
      color: #000;
      margin: 0;
      padding: 12px;
    }

    .window {
      max-width: 900px;
      margin: 0 auto;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      background: #c0c0c0;
    }

    .title-bar {
      background: #000080;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.8em;
      font-weight: bold;
      padding: 3px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title-bar-btns { display: flex; gap: 2px; }

    .tb-btn {
      width: 16px; height: 14px;
      background: #c0c0c0;
      border: 1px solid;
      border-color: #fff #808080 #808080 #fff;
      font-size: 0.65em; color: #000;
      text-align: center; line-height: 14px;
      cursor: default; font-family: Arial, sans-serif;
    }

    .win-body { padding: 10px 12px 14px; }

    .page-title {
      font-family: 'VT323', monospace;
      font-size: 72px;
      color: #ffff00;
      text-shadow: 3px 3px 0 #cc3300, 5px 5px 0 #881100;
      margin: 0;
      line-height: 1;
    }

    .rainbow-hr {
      height: 4px;
      background: linear-gradient(to right,
        #ff0000 0%, #ff0000 14%, #ff8800 14%, #ff8800 28%,
        #ffff00 28%, #ffff00 42%, #00cc00 42%, #00cc00 57%,
        #0000ff 57%, #0000ff 71%, #8800cc 71%, #8800cc 85%,
        #ff00ff 85%, #ff00ff 100%);
      border: none; margin: 8px 0;
    }

    .nav-row {
      display: flex; gap: 4px; margin: 6px 0; align-items: center;
    }

    .nav-btn {
      display: inline-block; padding: 3px 14px;
      background: #c0c0c0; color: #000; text-decoration: none;
      font-family: Arial, sans-serif; font-size: 0.82em; font-weight: bold;
      border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff;
    }

    .nav-btn:hover { border-color: #808080 #ffffff #ffffff #808080; }
    .nav-btn.active { border-color: #808080 #ffffff #ffffff #808080; background: #d4d0c8; }

    .content-area {
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      background: #ffffff;
      padding: 16px;
      margin-top: 8px;
      min-height: 220px;
    }

    .content-area h2 {
      font-family: Arial, sans-serif; font-size: 0.9em;
      font-weight: bold; text-transform: uppercase;
      color: #000080; border-bottom: 1px solid #ccc;
      padding-bottom: 4px; margin: 0 0 12px 0;
    }

    .toy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }

    .toy-card {
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      background: #f0f0f0;
      padding: 12px 10px;
      text-align: center;
    }

    .toy-icon {
      font-size: 1.8em;
      margin-bottom: 6px;
    }

    .toy-name {
      font-family: Arial, sans-serif;
      font-size: 0.8em;
      font-weight: bold;
      color: #000080;
      margin-bottom: 4px;
    }

    .toy-desc {
      font-family: "Times New Roman", serif;
      font-size: 0.78em;
      color: #444;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .toy-link {
      font-family: Arial, sans-serif;
      font-size: 0.75em;
      color: #0000cc;
      text-decoration: underline;
    }

    .toy-link:hover { color: #cc0000; }

    .toy-card.empty {
      border: 2px dashed #bbb;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 90px;
      font-family: Arial, sans-serif;
      font-size: 0.75em;
      color: #aaa;
      font-style: italic;
    }

    .footer-row {
      text-align: right; font-family: Arial, sans-serif;
      font-size: 0.72em; color: #555; margin-top: 8px;
    }
  </style>
</head>
